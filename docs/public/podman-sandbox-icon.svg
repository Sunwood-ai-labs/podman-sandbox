<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#892ca0"/>

  <!-- Container boxes - 3D cube effect -->
  <!-- Back container -->
  <g transform="translate(32, 32)">
    <polygon points="32,8 56,20 56,48 32,36" fill="#5e1f6e"/>
    <polygon points="8,20 32,8 32,36 8,48" fill="#7a2b8f"/>
    <polygon points="8,20 32,32 56,20 32,8" fill="#a43db8"/>
  </g>

  <!-- Middle container -->
  <g transform="translate(24, 48)">
    <polygon points="32,8 56,20 56,48 32,36" fill="#5e1f6e"/>
    <polygon points="8,20 32,8 32,36 8,48" fill="#7a2b8f"/>
    <polygon points="8,20 32,32 56,20 32,8" fill="#c44ed0"/>
  </g>

  <!-- Front container -->
  <g transform="translate(40, 56)">
    <polygon points="32,8 56,20 56,48 32,36" fill="#5e1f6e"/>
    <polygon points="8,20 32,8 32,36 8,48" fill="#7a2b8f"/>
    <polygon points="8,20 32,32 56,20 32,8" fill="#e070f0"/>
  </g>

  <!-- Highlight dots -->
  <circle cx="64" cy="28" r="4" fill="#fff" opacity="0.6"/>
  <circle cx="48" cy="44" r="3" fill="#fff" opacity="0.4"/>
  <circle cx="80" cy="44" r="3" fill="#fff" opacity="0.4"/>
</svg>
