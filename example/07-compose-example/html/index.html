<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podman Compose Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .status {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            margin: 20px 0;
            font-weight: bold;
        }
        .info {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }
        .info p {
            margin: 8px 0;
            color: #4b5563;
        }
        .info strong {
            color: #1f2937;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🐳</div>
        <h1>Podman Compose Demo</h1>
        <div class="status">✅ Running</div>
        <div class="info">
            <p><strong>Backend:</strong> Podman (daemonless)</p>
            <p><strong>Format:</strong> docker-compose.yml</p>
            <p><strong>Services:</strong> web + api</p>
            <p><strong>Port:</strong> 8085</p>
        </div>
    </div>
</body>
</html>
