version: "3.8"

services:
  # Web サーバー (nginx)
  web:
    image: docker.io/library/nginx:alpine
    ports:
      - "8085:80"
    networks:
      - app-network

  # API サーバー (シンプルなecho)
  api:
    image: docker.io/library/nginx:alpine
    ports:
      - "8086:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
